<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gestión de Producción ACME</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/lock--v1.png">
</head>

<body id="login-body">
    <div class="login-card">
        <div class="login-header">
            <h2>Login</h2>
            <p>Sistema de Gestión de Producción</p>
        </div>
        <div id="loginError" class="alert-message hidden"></div>

    
        <form id="loginForm">

            <div class="form-group">
                <label for="loginUsername">Número de identificación</label>
                <input
                    type="text"
                    id="loginUsername"
                    placeholder="Ingrese su identificación"
                    required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Contraseña</label>
                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Ingrese su contraseña"
                    required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                Ingresar
            </button>
        </form>
    </div>

</body>
</html>
