<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Gestión de Inventario</title>

    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/api.js" defer></script>
    <script src="../web-components/app-navbar.js" defer></script>
    <script src="../web-components/app-search-box.js" defer></script>
    <script src="../js/inventario.js" defer></script>

    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/product.png">
</head>

<body id="inventario-body">

    <app-navbar brand="Gestión de Inventario" active="inventario"></app-navbar>

    <div class="container">

        <div class="card">

            <h3 id="formProductTitle">
                Registrar Producto
            </h3>

            <form id="productForm">

                <input type="hidden" id="productId">

                <div class="form-row">

                    <div class="form-group">
                        <label for="productCodigo">
                            Código
                        </label>

                        <input
                            type="text"
                            id="productCodigo"
                            placeholder="Ej. MAT-001"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="productNombre">
                            Nombre del Producto
                        </label>

                        <input
                            type="text"
                            id="productNombre"
                            placeholder="Ej. Harina"
                            required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label for="productTipo">
                            Tipo de Producto
                        </label>

                        <select id="productTipo" required>

                            <option value="">
                                Seleccione un tipo
                            </option>

                            <option value="materia_prima">
                                Materia Prima
                            </option>

                            <option value="producto_terminado">
                                Producto Terminado
                            </option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label for="productProveedor">
                            Proveedor
                        </label>

                        <input
                            type="text"
                            id="productProveedor"
                            placeholder="Ej. Alimentos S.A."
                            required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label for="productCantidad">
                            Cantidad Disponible
                        </label>

                        <input
                            type="number"
                            id="productCantidad"
                            placeholder="Ej. 100"
                            min="1"
                            step="1"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="productPrecio">
                            Precio
                        </label>

                        <input
                            type="number"
                            id="productPrecio"
                            placeholder="Ej. 450.000"
                            min="1"
                            step="1"
                            required>
                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="submit"
                        id="btnProductSubmit"
                        class="btn btn-primary">
                        Agregar Producto
                    </button>

                    <button
                        type="button"
                        id="btnCancelProductEdit"
                        class="btn btn-secondary hidden">
                        Cancelar
                    </button>

                </div>

            </form>

        </div>

        <div class="card">

            <h3>
                Aumentar Stock
            </h3>

            <form id="stockForm">

                <div class="form-row">

                    <div class="form-group">
                        <label for="stockCodigo">
                            Código del Producto
                        </label>

                        <input
                            type="text"
                            id="stockCodigo"
                            placeholder="Ej. MAT-001"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="stockCantidad">
                            Cantidad a Aumentar
                        </label>

                        <input
                            type="number"
                            id="stockCantidad"
                            placeholder="Ej. 50"
                            min="1"
                            step="1"
                            required>
                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="submit"
                        id="btnStockSubmit"
                        class="btn btn-success">
                        Aumentar Stock
                    </button>

                </div>

            </form>

        </div>

        <div class="card table-card">

            <h3>
                Inventario de Productos
            </h3>

            <app-search-box
                placeholder="Buscar producto..."
                target="productsTableBody">
            </app-search-box>

            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>

                            <th>Código</th>
                            <th>Producto</th>
                            <th>Tipo</th>
                            <th>Proveedor</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="productsTableBody"></tbody>

                </table>

            </div>

        </div>

    </div>

</body>
</html>
