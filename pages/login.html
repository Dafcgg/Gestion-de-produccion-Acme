<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gestión de Producción ACME</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/api.js" defer></script>
    <script src="../js/auth-usuarios.js" defer></script>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/lock--v1.png">
</head>

<body id="login-body">
    <div class="login-card">
        <div class="login-header">
            <h2>Login</h2>
            <p>Sistema de Gestión de Producción</p>
        </div>
        <div id="loginError" class="alert-message hidden"></div>

    
        <form id="loginForm" autocomplete="off">

            <div class="form-group">
                <label for="loginUsername">Número de identificación</label>
                <input
                    type="text"
                    id="loginUsername"
                    placeholder="Ingrese su identificación"
                    autocomplete="off"
                    required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Contraseña</label>
                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Ingrese su contraseña"
                    autocomplete="off"
                    required>
            </div>
            <button type="submit"  id="btnLoginSubmit" class="btn btn-primary btn-block">
                Ingresar
            </button>
        </form>
    </div>

    <script>
        window.addEventListener("pageshow", (event) => {
            if (event.persisted) {
                document.getElementById("loginForm").reset();
                const loginError = document.getElementById("loginError");
                if (loginError) loginError.classList.add("hidden");
            }
        });
    </script>

</body>
</html>
