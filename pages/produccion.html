<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producción | Gestión de Producción ACME</title>

    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/api.js" defer></script>
    <script src="../web-components/app-navbar.js" defer></script>
    <script src="../web-components/app-search-box.js" defer></script>
    <script src="../js/produccion.js" defer></script>

    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/factory.png">
</head>

<body id="produccion-body">

    <app-navbar brand="Gestión de Producción" active="produccion"></app-navbar>

    <div class="container">

        <div class="card">

            <h3 id="formProductionTitle">
                Registrar Producción
            </h3>

            <form id="productionForm">

                <input type="hidden" id="productionId">

                <div class="form-row">

                    <div class="form-group">
                        <label for="productionCode">
                            Código de Producción
                        </label>

                        <input
                            type="text"
                            id="productionCode"
                            readonly
                            placeholder="Generado automáticamente">
                    </div>

                    <div class="form-group">
                        <label for="productionProduct">
                            Producto Terminado
                        </label>

                        <select id="productionProduct" required>

                            <option value="">
                                Seleccione un producto
                            </option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label for="productionQuantity">
                            Cantidad a Fabricar
                        </label>

                        <input
                            type="number"
                            id="productionQuantity"
                            min="1"
                            step="1"
                            placeholder="Ej. 10"
                            required>
                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="submit"
                        id="btnProductionSubmit"
                        class="btn btn-primary">

                        Fabricar Producto

                    </button>

                    <button
                        type="reset"
                        class="btn btn-secondary">

                        Limpiar

                    </button>

                </div>

            </form>

        </div>

        <div class="card">

            <h3>
                Fórmula del Producto
            </h3>

            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>
                            <th>Materia Prima</th>
                            <th>Cantidad Necesaria</th>
                        </tr>

                    </thead>

                    <tbody id="formulaTableBody">

                        <tr>

                            <td colspan="2">
                                Seleccione un producto para visualizar su fórmula.
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <div class="card">

            <h3>
                Resumen de Producción
            </h3>

            <div id="productionSummary" class="summary-box">

                <p>
                    Aún no se ha realizado ninguna producción.
                </p>

            </div>

        </div>

        <div class="card table-card">

            <h3>
                Historial de Producción
            </h3>

            <app-search-box
                placeholder="Buscar producción..."
                target="productionTableBody">
            </app-search-box>

            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>

                            <th>Código</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Fecha</th>
                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="productionTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
