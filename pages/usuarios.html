<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | Gestión de Usuarios</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/auth-usuarios.js" defer></script>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/conference-call.png">
</head>

<body id="usuarios-body">
    <nav class="navbar">
        <div class="navbar-brand">Gestión de Usuarios</div>
        <div class="navbar-nav">
            <a href="inventario.html" class="btn btn-secondary">Volver a Inventario</a>
            <a href="receta.html" class="btn btn-production">Receta</a>
            <a href="produccion.html" class="btn btn-production">Producción</a>
            <button id="btnLogout" class="btn btn-danger">Cerrar Sesión</button>
        </div>
    </nav>



    <div class="container">
        <div class="card">

            <h3 id="formUserTitle">
                Registrar Usuario
            </h3>

            <form id="userForm">

                <input type="hidden" id="userId">

                <div class="form-row">

                    <div class="form-group">
                        <label for="userCedula">
                            Número de Identificación
                        </label>

                        <input
                            type="number"
                            id="userCedula"
                            placeholder="Ej. 1001234567"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="userNombre">
                            Nombre Completo
                        </label>
                        <input
                            type="text"
                            id="userNombre"
                            placeholder="Ingrese el nombre completo"
                            required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label for="userCargo">
                            Cargo
                        </label>

                        <select id="userCargo" required>

                            <option value="">
                                Seleccione un cargo
                            </option>

                            <option>
                                Administrador
                            </option>

                            <option>
                                Supervisor
                            </option>

                            <option>
                                Operario
                            </option>

                            <option>
                                Almacenista
                            </option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="userPassword">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            id="userPassword"
                            placeholder="********"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="confirmPassword">
                            Confirmar Contraseña
                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="********"
                            required>

                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="submit"
                        id="btnUserSubmit"
                        class="btn btn-primary">

                        Guardar Usuario

                    </button>

                    <button
                        type="button"
                        id="btnCancelUserEdit"
                        class="btn btn-secondary hidden">

                        Cancelar

                    </button>

                </div>

            </form>

        </div>

        <div class="card table-card">

            <h3>
                Usuarios Registrados
            </h3>

            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>

                            <th>Identificación</th>

                            <th>Nombre Completo</th>

                            <th>Cargo</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
